services:
  mysql-db:
    container_name: cont-db-mysql-data-service
    image: mysql:8.4.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: data_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./data/db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-padmin123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  flask-api:
    container_name: cont-api-flask-data-service
    build:
      context: ./api
      dockerfile: ../docker/api.dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./api:/app
      - ./data:/app/data:ro
    environment:
      FLASK_ENV: development
      FLASK_APP: app.main:app
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_NAME: data_db
      DB_USER: root
      DB_PASSWORD: admin123
    depends_on:
      mysql-db:
        condition: service_healthy
    command: gunicorn --bind 0.0.0.0:5000 --reload app.main:app

volumes:
  mysql_data: